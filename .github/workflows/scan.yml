name: scheduled-scan

on:
  schedule:
    # Weekly, Mondays 09:00 UTC. Adjust in config/.github-scanner.yml comment.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "init | scan"
        required: false
        default: "scan"

permissions:
  contents: read

concurrency:
  group: secwatcher-scheduled
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v3.2.4

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install trufflehog
        run: |
          curl -sSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v3.82.13
          trufflehog --version

      - name: Install project
        run: uv sync --frozen || uv sync

      - name: Run scan
        env:
          REPOSENTRY_APP_ID: ${{ secrets.REPOSENTRY_APP_ID }}
          REPOSENTRY_INSTALLATION_ID: ${{ secrets.REPOSENTRY_INSTALLATION_ID }}
          REPOSENTRY_APP_PRIVATE_KEY: ${{ secrets.REPOSENTRY_APP_PRIVATE_KEY }}
          REPOSENTRY_SLACK_WEBHOOK: ${{ secrets.REPOSENTRY_SLACK_WEBHOOK }}
        run: |
          mode="${{ inputs.mode || 'scan' }}"
          uv run secwatcher "$mode"
          uv run secwatcher report --format md --out reports/latest.md

      - name: Upload report artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: secwatcher-report
          path: reports/
          retention-days: 30
