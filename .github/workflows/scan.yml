name: scheduled-scan

on:
  schedule:
    # Weekly, Mondays 09:00 UTC. Adjust in config/.github-scanner.yml comment.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "init | scan"
        required: false
        default: "scan"

permissions:
  contents: read

concurrency:
  group: secwatcher-scheduled
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install trufflehog
        run: |
          curl -sSL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v3.82.13
          trufflehog --version

      - name: Install project
        run: uv sync --frozen || uv sync

      - name: Run scan
        env:
          REPOSENTRY_APP_ID: ${{ secrets.REPOSENTRY_APP_ID }}
          REPOSENTRY_INSTALLATION_ID: ${{ secrets.REPOSENTRY_INSTALLATION_ID }}
          REPOSENTRY_APP_PRIVATE_KEY: ${{ secrets.REPOSENTRY_APP_PRIVATE_KEY }}
          REPOSENTRY_SLACK_WEBHOOK: ${{ secrets.REPOSENTRY_SLACK_WEBHOOK }}
        run: |
          mode="${{ inputs.mode || 'scan' }}"
          # Skip Slack delivery if no webhook is configured. Once
          # REPOSENTRY_SLACK_WEBHOOK is set to a real URL, this auto-enables.
          slack_flag=""
          if [ -z "$REPOSENTRY_SLACK_WEBHOOK" ]; then
            echo "::notice::REPOSENTRY_SLACK_WEBHOOK is empty; running with --no-slack"
            slack_flag="--no-slack"
          fi
          uv run secwatcher "$mode" $slack_flag
          uv run secwatcher report --format md --out reports/latest.md

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: secwatcher-report
          path: reports/
          retention-days: 30
